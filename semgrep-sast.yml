name: Semgrep SAST Scan

on:
  push:
    branches: [ "master", "main" ]

jobs:
  semgrep-scan:
    name: Run Semgrep
    runs-on: ubuntu-latest

    steps:
      
name: Checkout Code
      uses: actions/checkout@v4

      
name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

      
name: Install Semgrep
      run: pip install semgrep

      
name: Run Semgrep SAST
      run: semgrep scan --config auto .
name: Semgrep SAST Scan

# الخطوة 4: تشغيل الـ workflow عند كل عملية Push
on: [push]

jobs:
  semgrep-scan:
    name: Run Semgrep
    runs-on: ubuntu-latest
    steps:
      # سحب الكود من المستودع
      - name: Checkout code
        uses: actions/checkout@v4

      # تنزيل أداة Semgrep
      - name: Install Semgrep
        run: python -m pip install semgrep

      # الخطوة 5: تشغيل الفحص وطباعة النتائج على الـ Console
      - name: Run Semgrep SAST
        run: semgrep scan --config auto
